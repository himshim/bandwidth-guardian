name: Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: echo "version=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")" >> $GITHUB_OUTPUT

      - name: Build extension zip
        run: |
          zip -r bandwidth-guardian-${{ steps.version.outputs.version }}.zip \
            manifest.json \
            defaults.js \
            service-worker.js \
            content.js \
            prehook.js \
            popup.html \
            popup.js \
            options.html \
            options.js \
            _locales \
            icons

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandwidth-guardian-zip
          path: bandwidth-guardian-*.zip
          retention-days: 30

      - name: Attach zip to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bandwidth-guardian-*.zip
